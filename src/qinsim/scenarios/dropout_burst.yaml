# Harbour scenario + 5-second silent windows every 30 seconds on the
# GNSS channel. Tests Qinsy's gap detection, time-coast behaviour, and
# whether motion / heading streams remain coherent through the gap.
#
# Each driver fans out to its own UDP port — Qinsy demuxes by port.

name: dropout_burst

drivers:

  gnss_primary:
    kind: gnss
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13130
    state:
      latitude: -33.85
      longitude: 151.21
      altitude_msl: 25.0
      heading_true: 90.0
      speed_knots: 4.0
      fix_quality: 4
      num_satellites: 12
      hdop: 0.6
      sentences: [GGA, RMC, VTG]
    effects:
      # 5-second blackout, recurring every 30s. BurstDropoutEffect's
      # cycle is interval_s; the blackout occupies the leading
      # duration_s of each cycle.
      - kind: burst_dropout
        duration_s: 5.0
        interval_s: 30.0

  heading_primary:
    kind: heading
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13131
    state:
      current_heading_deg: 90.0
      target_heading_deg: 90.0
      turn_rate_dps: 5.0
      sentences: [HDT]

  motion_primary:
    kind: motion
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13132
    state:
      sea_state: 1

  depth_primary:
    kind: depth
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13133
    state:
      depth_m: 18.5
      transducer_offset_m: 0.5

  env_primary:
    kind: env
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13134
    state:
      water_temp_c: 18.5
