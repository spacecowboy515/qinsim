# Sydney harbour, RTK fixed, calm sea state. Default smoke test —
# every driver online, no fault injection. If qinsim is wired
# correctly to a Qinsy box this should produce a clean stable trace
# in the Online and Replay panels with no flagged anomalies.
#
# Each driver fans out to its own UDP port — Qinsy demuxes by port,
# not by inspecting payload, so a one-port-per-sensor layout is the
# cleanest way to wire the receiving side.

name: harbour_rtk_fixed

drivers:

  gnss_primary:
    kind: gnss
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13130
    state:
      latitude: -33.85
      longitude: 151.21
      altitude_msl: 25.0
      heading_true: 90.0
      speed_knots: 4.0
      fix_quality: 4         # RTK fixed
      num_satellites: 12
      hdop: 0.6
      sentences: [GGA, RMC, VTG, GST, ZDA]

  heading_primary:
    kind: heading
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13131
    state:
      current_heading_deg: 90.0
      target_heading_deg: 90.0
      turn_rate_dps: 5.0
      sentences: [HDT]

  motion_primary:
    kind: motion
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13132
    state:
      sea_state: 1

  depth_primary:
    kind: depth
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13133
    state:
      depth_m: 18.5
      transducer_offset_m: 0.5
      max_range_m: 200.0
      walk_rate_m_per_s: 0.05

  env_primary:
    kind: env
    rate_hz: 1
    destinations:
      - host: 127.0.0.1
        port: 13134
    state:
      water_temp_c: 18.5
      pressure_bar: 1.013
      humidity_pct: 65.0
      temp_walk_c_per_s: 0.02
