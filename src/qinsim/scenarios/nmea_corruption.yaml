# Harbour scenario + 5% checksum-corruption rate on every driver's
# stream. Exercises Qinsy's NMEA-error path: how the template surfaces
# rejected sentences, whether downstream computations cope with rate
# loss, and whether the operator gets useful diagnostics.

name: nmea_corruption

destinations:
  - host: 127.0.0.1
    port: 13130

drivers:

  gnss_primary:
    kind: gnss
    rate_hz: 10
    state:
      latitude: -33.85
      longitude: 151.21
      altitude_msl: 25.0
      heading_true: 90.0
      speed_knots: 4.0
      fix_quality: 4
      num_satellites: 12
      hdop: 0.6
      sentences: [GGA, RMC, VTG]
    effects:
      - kind: corrupt
        prob: 0.05
        mode: checksum
        seed: 42

  heading_primary:
    kind: heading
    rate_hz: 20
    state:
      current_heading_deg: 90.0
      target_heading_deg: 90.0
      turn_rate_dps: 5.0
      sentences: [HDT]
    effects:
      - kind: corrupt
        prob: 0.05
        mode: checksum
        seed: 43

  motion_primary:
    kind: motion
    rate_hz: 25
    state:
      sea_state: 1
    effects:
      - kind: corrupt
        prob: 0.05
        mode: checksum
        seed: 44

  depth_primary:
    kind: depth
    rate_hz: 5
    state:
      depth_m: 18.5
      transducer_offset_m: 0.5
    effects:
      - kind: corrupt
        prob: 0.05
        mode: checksum
        seed: 45

  env_primary:
    kind: env
    rate_hz: 1
    state:
      water_temp_c: 18.5
